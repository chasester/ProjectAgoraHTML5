<script>
// iOS Soft Fullscreen Fallback
// iOS WebKit does not support the Fullscreen API for canvas elements.
// We detect iOS and intercept the fullscreen button to use CSS-based soft fullscreen.
(function() {
	var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
		(navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

	if (isIOS) {
		var btn = document.getElementById('fullscreen_request');
		if (btn) {
			var isSoftFullscreen = false;
			btn.addEventListener('click', function(e) {
				e.stopImmediatePropagation(); // Prevent the C++ emscripten callback from also firing
				e.preventDefault();
				isSoftFullscreen = !isSoftFullscreen;
				var canvas = document.getElementById('canvas');
				if (isSoftFullscreen) {
					document.body.classList.add('soft-fullscreen');
					// Resize the canvas render resolution to match the screen
					if (canvas) {
						canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
						canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
					}
					window.scrollTo(0, 1); // Hide address bar
				} else {
					document.body.classList.remove('soft-fullscreen');
					// Restore original canvas size (let engine handle it)
					if (canvas && typeof Module !== 'undefined') {
						// Trigger canvas resize notification so the engine adjusts
					}
				}
				// Notify the engine that the canvas size changed
				if (typeof Module !== 'undefined' && Module['UE4_canvasSizeChanged']) {
					Module['UE4_canvasSizeChanged']();
				}
				if (canvas) {
					canvas.focus();
				}
			}, true); // useCapture=true to run before the emscripten handler
		}
	}
})();
</script>
